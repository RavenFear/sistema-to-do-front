<div class="surface-ground h-screen w-screen flex align-items-center justify-content-center"
     [ngClass]="{'p-input-filled': filledInput}">
    <div class="surface-card py-7 px-5 sm:px-7 shadow-2 flex flex-column w-11 sm:w-30rem" style="border-radius:14px">
        <h1 class="font-bold text-2xl mt-0 mb-2">VERONA</h1>
        <p class="text-color-secondary mb-4">
            Bienvenido a la <strong>Comunidad Verona</strong>, donde ocurre la magia.
            Inicia sesión para continuar.
        </p>

        <span class="p-input-icon-left mb-4">
            <i class="pi pi-user"></i>
         <input type="email" pInputText placeholder="Correo electrónico" class="w-full" [(ngModel)]="email">
        </span>

        <span class="p-input-icon-left mb-4">
            <i class="pi pi-key"></i>
        <input type="password" pInputText placeholder="Contraseña" class="w-full" [(ngModel)]="password">
        </span>

        <button (click)="login()"
                pButton
                pRipple
                label="Iniciar sesión"
                class="mb-4"
                [disabled]="!email || !password"
        >
        </button>
        @if (error) {
            <div class="text-red-500 text-center mb-3">
                {{ error }}
            </div>
        }

        <span class="text-color-secondary text-center mb-4">o inicia sesión con</span>

        <div class="flex gap-4 align-items-center justify-content-center">
            <a href="https://www.facebook.com"
               class="inline-flex flex-shrink-0 w-3rem h-3rem justify-content-center align-items-center surface-ground border-circle">
                <i class="pi pi-facebook text-2xl text-color"></i>
            </a>
            <a href="https://www.twitter.com"
               class="inline-flex flex-shrink-0 w-3rem h-3rem justify-content-center align-items-center surface-ground border-circle">
                <i class="pi pi-twitter text-2xl text-color"></i>
            </a>
            <a href="https://www.google.com"
               class="inline-flex flex-shrink-0 w-3rem h-3rem justify-content-center align-items-center surface-ground border-circle">
                <i class="pi pi-google text-2xl text-color"></i>
            </a>
            <a href="https://www.github.com"
               class="inline-flex flex-shrink-0 w-3rem h-3rem justify-content-center align-items-center surface-ground border-circle">
                <i class="pi pi-github text-2xl text-color"></i>
            </a>
        </div>
    </div>
</div>
