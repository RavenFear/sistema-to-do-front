<p-dialog [(visible)]="display" [modal]="true" [focusOnShow]="false" [maximizable]="true"
          (onHide)="onHide()"
          [style]="{'width': '60%'}">
    <p-header>
        <h5>Orden</h5>
    </p-header>
    <div class="col-12">
        <div class="card">
            <form [formGroup]="form" class="p-fluid p-formgrid grid">

                <!-- Nombre del Pedido -->
                <div class="field col-12 md:col-6">
                    <label for="nombre">Cantidad</label>
                    <input pInputText id="nombre" type="number" formControlName="nombre"/>
                </div>

                <!-- Descripción -->
                <div class="field col-12">
                    <label for="descripcion">Descripción</label>
                    <textarea pInputTextarea id="descripcion" rows="4" formControlName="descripcion"></textarea>
                </div>

                <!-- Fecha de Registro -->
                <div class="field col-12 md:col-6">
                    <label for="fechaRegistro">Fecha de Registro</label>
                    <input pInputText type="date" id="fechaRegistro" formControlName="fechaRegistro"/>
                </div>

                <!-- Fecha de Compromiso -->
                <div class="field col-12 md:col-6">
                    <label for="fechaCompromiso">Fecha de Compromiso</label>
                    <input pInputText type="date" id="fechaCompromiso" formControlName="fechaCompromiso"/>
                </div>

                <!-- Estado -->
                <div class="field col-12 md:col-6">
                    <label>Estado</label>
                    <p-dropdown
                        [options]="statusOptions"
                        [filter]="true"
                        [filterFields]="['label']"
                        [formControl]="form.controls['status']"
                        appendTo="body"
                    ></p-dropdown>
                </div>

                <!-- Detalles del Cliente -->
                <div class="field col-12 md:col-6">
                    <label for="clienteNombre">Nombre del Cliente</label>
                    <input pInputText id="clienteNombre" type="text" formControlName="clienteNombre"/>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="clienteTelefono">Teléfono</label>
                    <input pInputText id="clienteTelefono" type="text" formControlName="clienteTelefono"/>
                </div>

                <div class="field col-12 md:col-6">
                    <label for="clienteEmail">Correo Electrónico</label>
                    <input pInputText id="clienteEmail" type="email" formControlName="clienteEmail"/>
                </div>

                <!-- Dirección de Envío -->
                <div class="field col-12">
                    <label for="direccionEnvio">Dirección de Envío</label>
                    <textarea pInputTextarea id="direccionEnvio" rows="3" formControlName="direccionEnvio"></textarea>
                </div>

                <!-- Productos Solicitados -->
                <div class="field col-12">
                    <label for="productos">Productos Solicitados (nombre y cantidad)</label>
                    <textarea pInputTextarea id="productos" rows="4" formControlName="productos"
                              placeholder="Ejemplo: Producto A - 2 unidades, Producto B - 1 unidad"></textarea>
                </div>

            </form>
        </div>
    </div>
    <p-footer>
        <button pButton pRipple class="p-button-danger flex-1 p-button-outlined" label="Cancelar"
                type="button"
                icon="pi pi-fw pi-trash"></button>
        <button pButton pRipple class="p-button-primary flex-1 border-round" label="Guardar"
                (click)="onSubmit()"
                type="submit" [disabled]="!form.valid"
                icon="pi pi-fw pi-check"></button>
    </p-footer>
</p-dialog>
